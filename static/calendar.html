<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currently Airing - MyDramaList API</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::selection { background-color: #22d3ee; color: #020617; }
        .hero-bg { background-image: radial-gradient(ellipse at top, rgba(14, 116, 144, 0.2), transparent 50%); }
        
        /* Hide scrollbar for tabs but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .drama-poster-container {
            position: relative;
            width: 100%;
            padding-top: 150%; /* 2:3 aspect ratio — standard drama poster */
            overflow: hidden;
            background: #1e293b;
        }

        .drama-poster-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top; /* bias toward faces/top of poster */
            transition: transform 0.5s ease;
        }

        .drama-card:hover .drama-poster-container img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-slate-300">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-slate-950/70 backdrop-blur-lg border-b border-slate-800">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/static/index.html" class="flex items-center gap-3">
                <svg class="w-7 h-7 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72"></path></svg>
                <span class="font-bold text-lg text-white">MyDramaList API</span>
            </a>
            <div class="flex items-center space-x-4">
                <a href="/static/index.html" class="text-sm font-medium text-slate-400 hover:text-white transition">API Docs</a>
                <a href="/static/calendar.html" class="text-sm font-medium text-cyan-400 hover:text-cyan-300 transition">Calendar</a>
                <a href="https://github.com/B1PL0B/MyDramaList-Unofficial-API" target="_blank" class="text-slate-400 hover:text-white transition" aria-label="GitHub">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.168 6.839 9.492.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.031-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.338 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.001 10.001 0 0022 12c0-5.523-4.477-10-10-10z" clip-rule="evenodd"></path></svg>
                </a>
            </div>
        </nav>
        
        <!-- Tab Bar (Sticky) -->
        <div class="border-t border-slate-800 bg-slate-950/95 backdrop-blur-md">
            <div class="container mx-auto px-6 py-3">
                <div class="flex overflow-x-auto no-scrollbar gap-2 flex-nowrap" id="day-tabs">
                    <!-- Tabs will be rendered here -->
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-7xl">
        <!-- Hero Section -->
        <section class="hero-bg text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-br from-white to-slate-400 text-transparent bg-clip-text">
                Currently Airing
            </h1>
            <p id="hero-date" class="text-slate-400 text-sm mb-1"></p>
            <p class="text-lg text-slate-400 max-w-2xl mx-auto mb-6">
                Live drama schedule from MyDramaList — updated on page load
            </p>
            <div class="flex justify-center items-center gap-3">
                <div id="total-badge" class="inline-block bg-slate-900 border border-slate-800 rounded-full px-4 py-1.5 text-sm font-medium text-cyan-400 opacity-0 transition-opacity duration-300">
                    Loading schedule...
                </div>
                <div id="cache-badge" class="hidden inline-flex items-center gap-1.5 bg-slate-900 border border-slate-800 rounded-full px-3 py-1.5 text-sm font-medium transition-opacity duration-300">
                </div>
            </div>
        </section>
        
        <!-- Error Banner -->
        <div id="error-banner" class="hidden mb-8 p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-center font-medium">
            ⚠️ Failed to load calendar data. Is the API running?
        </div>

        <!-- Content Area -->
        <div id="calendar-container" class="min-h-[500px]">
            <!-- Skeleton Grid -->
            <div id="skeleton-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Skeletons generated by JS -->
            </div>
            
            <!-- Drama Grid -->
            <div id="drama-grid" class="hidden grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Cards generated by JS -->
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-slate-400 text-lg">
                <span class="text-4xl mb-4">📅</span>
                <p id="empty-message">No dramas scheduled for today.</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 mt-20">
        <div class="container mx-auto px-6 py-8 text-center text-slate-500 text-sm">
             <p>© 2024 MyDramaList Unofficial API. Built for educational purposes.</p>
        </div>
    </footer>

    <script>
        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        let calendarData = null;
        let currentDay = new Date().toLocaleDateString('en-US', { weekday: 'long' });

        function getWeekDates() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const today = new Date();
            const todayIndex = today.getDay(); // 0 = Sunday, 1 = Monday, etc.

            // Build a map: day name → { date: Date object, dateNum: "07", monthShort: "Jun" }
            const result = {};
            days.forEach((dayName, i) => {
                const diff = i - todayIndex;
                const d = new Date(today);
                d.setDate(today.getDate() + diff);
                result[dayName] = {
                    dateNum: String(d.getDate()).padStart(2, '0'),
                    monthShort: d.toLocaleDateString('en-US', { month: 'short' }),
                    fullDate: d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
                };
            });
            return result;
        }
        
        const weekDates = getWeekDates();

        function upgradeImageUrl(url) {
            if (!url) return '';
            // Replace known thumbnail suffixes with the full-size variant
            return url.replace(/_4t\.jpg/, '_4f.jpg')
                      .replace(/_4s\.jpg/, '_4f.jpg')
                      .replace(/_3t\.jpg/, '_3f.jpg')
                      .replace(/_3s\.jpg/, '_3f.jpg');
        }
        
        // UI Elements
        const tabsContainer = document.getElementById('day-tabs');
        const skeletonGrid = document.getElementById('skeleton-grid');
        const dramaGrid = document.getElementById('drama-grid');
        const emptyState = document.getElementById('empty-state');
        const emptyMessage = document.getElementById('empty-message');
        const errorBanner = document.getElementById('error-banner');
        const totalBadge = document.getElementById('total-badge');
        const cacheBadge = document.getElementById('cache-badge');
        
        const heroDate = document.getElementById('hero-date');
        if (heroDate) {
            const todayLabel = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            heroDate.textContent = todayLabel;
        }

        function initSkeletons() {
            skeletonGrid.innerHTML = Array(10).fill().map(() => `
                <div class="rounded-xl overflow-hidden bg-slate-900 border border-slate-800 flex flex-col h-full animate-pulse">
                    <div class="drama-poster-container bg-slate-800/50"></div>
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="h-5 bg-slate-800/80 rounded w-3/4 mb-3"></div>
                        <div class="h-3 bg-slate-800/50 rounded w-1/2 mb-2"></div>
                        <div class="h-3 bg-slate-800/50 rounded w-1/3"></div>
                    </div>
                </div>
            `).join('');
        }

        function renderTabs() {
            tabsContainer.innerHTML = DAYS.map(day => {
                const isActive = day === currentDay;
                const dayInfo = weekDates[day];
                const dayShort = day.substring(0, 3).toUpperCase();
                
                if (isActive) {
                    return `
                        <button 
                            onclick="switchDay('${day}')"
                            class="min-w-[80px] px-4 py-3 rounded-xl flex flex-col items-center justify-center focus:outline-none transition-colors bg-cyan-500 text-white shadow-lg shadow-cyan-500/20"
                        >
                            <span class="text-xs font-semibold tracking-widest uppercase">${dayShort}</span>
                            <span class="text-2xl font-bold">${dayInfo.dateNum}</span>
                            <span class="text-xs">${dayInfo.monthShort}</span>
                        </button>
                    `;
                } else {
                    return `
                        <button 
                            onclick="switchDay('${day}')"
                            class="min-w-[80px] px-4 py-3 rounded-xl flex flex-col items-center justify-center focus:outline-none transition-colors bg-slate-800 text-slate-300 hover:bg-slate-700"
                        >
                            <span class="text-xs font-semibold tracking-widest uppercase text-slate-400">${dayShort}</span>
                            <span class="text-2xl font-bold text-white">${dayInfo.dateNum}</span>
                            <span class="text-xs text-slate-400">${dayInfo.monthShort}</span>
                        </button>
                    `;
                }
            }).join('');
            
            // Scroll active tab into view on mobile
            const activeTabBtn = tabsContainer.querySelector('.bg-cyan-500');
            if (activeTabBtn) {
                activeTabBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function renderGrid(day) {
            skeletonGrid.classList.add('hidden');
            
            if (!calendarData || !calendarData.days || !calendarData.days[day]) {
                dramaGrid.classList.add('hidden');
                emptyMessage.textContent = `No data available for ${day}.`;
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            const dramas = calendarData.days[day];
            
            if (dramas.length === 0) {
                dramaGrid.classList.add('hidden');
                emptyMessage.textContent = `No dramas scheduled for ${day}.`;
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            dramaGrid.classList.remove('hidden');

            dramaGrid.innerHTML = dramas.map(drama => `
                <a href="${drama.url}" target="_blank" rel="noopener noreferrer" 
                   class="drama-card group flex flex-col bg-slate-900 border border-slate-800 rounded-xl overflow-hidden hover:border-cyan-500/50 hover:shadow-xl hover:shadow-cyan-500/10 hover:-translate-y-1 transition-all duration-300">
                    
                    <div class="drama-poster-container">
                        ${drama.image ? 
                            `<img src="${upgradeImageUrl(drama.image)}" alt="${drama.title}" loading="lazy" />` : 
                            `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1e293b;" class="text-slate-600">
                                <svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>`
                        }
                        
                        ${drama.air_time ? 
                            `<div class="absolute top-2 right-2 bg-slate-900/80 backdrop-blur text-cyan-300 text-xs px-2.5 py-1 rounded-full font-medium border border-slate-700/50">
                                ${drama.air_time}
                            </div>` : ''
                        }
                        
                        ${drama.rating ? 
                            `<div class="absolute bottom-2 left-2 bg-slate-900/80 backdrop-blur text-amber-400 text-xs px-2 py-1 rounded-md font-bold flex items-center gap-1 border border-amber-500/20">
                                ⭐ ${drama.rating}
                            </div>` : ''
                        }
                    </div>
                    
                    <div class="p-4 flex flex-col flex-1">
                        <h3 class="font-bold text-white leading-tight mb-2 group-hover:text-cyan-400 transition-colors line-clamp-2">${drama.title}</h3>
                        <div class="mt-auto space-y-1">
                            ${drama.episode ? `<div class="text-cyan-400 text-xs font-medium">${drama.episode}</div>` : ''}
                            ${drama.network ? `<div class="text-slate-500 text-xs truncate" title="${drama.network}">${drama.network}</div>` : ''}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        window.switchDay = function(day) {
            currentDay = day;
            renderTabs();
            renderGrid(day);
        };

        async function fetchCalendar() {
            initSkeletons();
            renderTabs(); // Render initial tabs state
            
            try {
                const cached = sessionStorage.getItem('mdl_calendar');
                const cachedTime = sessionStorage.getItem('mdl_calendar_time');
                const SESSION_TTL = 60 * 60 * 1000; // 1 hour in ms

                let data;

                if (cached && cachedTime && (Date.now() - parseInt(cachedTime)) < SESSION_TTL) {
                    data = JSON.parse(cached);
                    if (cacheBadge) {
                        cacheBadge.classList.remove('hidden');
                        const ageMins = Math.floor((Date.now() - parseInt(cachedTime)) / 60000);
                        cacheBadge.innerHTML = `<span class="text-slate-400">●</span> <span class="text-slate-400">Cached (${ageMins}m ago)</span>`;
                    }
                } else {
                    const res = await fetch('/api/calendar');
                    if (!res.ok) throw new Error('API response not OK');
                    
                    data = await res.json();
                    if (data.error) throw new Error(data.description || 'API Error');
                    
                    sessionStorage.setItem('mdl_calendar', JSON.stringify(data));
                    sessionStorage.setItem('mdl_calendar_time', Date.now().toString());

                    const cacheStatus = res.headers.get('X-Cache');
                    const cacheAge = res.headers.get('X-Cache-Age');
                    
                    if (cacheBadge) {
                        cacheBadge.classList.remove('hidden');
                        if (cacheStatus === 'HIT') {
                            const ageStr = cacheAge ? cacheAge.replace('s', '') : '0';
                            const ageMins = Math.floor(parseInt(ageStr) / 60);
                            cacheBadge.innerHTML = `<span class="text-slate-400">●</span> <span class="text-slate-400">Cached (${ageMins}m ago)</span>`;
                        } else {
                            cacheBadge.innerHTML = `<span class="text-green-500">●</span> <span class="text-green-400">Live data</span>`;
                        }
                    }
                }
                
                calendarData = data;
                
                // Update total badge
                totalBadge.textContent = `${data.total} dramas airing this week`;
                totalBadge.classList.remove('opacity-0');
                
                renderGrid(currentDay);
            } catch (err) {
                console.error(err);
                skeletonGrid.classList.add('hidden');
                errorBanner.classList.remove('hidden');
            }
        }

        // Init
        fetchCalendar();
    </script>
</body>
</html>
